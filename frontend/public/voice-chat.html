<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Persona — Voice Chat</title>
  <meta name="description" content="Immersive AI voice chat powered by Groq and ElevenLabs." />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <style>
    body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

    #visualizer-canvas { position: fixed; top: 0; left: 0; z-index: 1; }

    .overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; flex-direction: column; justify-content: space-between; align-items: center;
      z-index: 2;
      background:
        radial-gradient(ellipse at 70% 80%, rgba(131,58,180,.15), transparent 50%),
        radial-gradient(ellipse at 30% 90%, rgba(253,29,29,.1), transparent 60%),
        radial-gradient(ellipse at 50% 100%, rgba(252,176,69,.08), transparent 70%);
    }

    /* talk button pulse */
    .talk-btn-pulse { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(225,48,108,.6); }
      70%  { box-shadow: 0 0 0 28px rgba(225,48,108,0); }
      100% { box-shadow: 0 0 0 0 rgba(225,48,108,0); }
    }

    /* recording glow */
    .recording-active {
      animation: recording-glow 1.2s ease-in-out infinite alternate;
    }
    @keyframes recording-glow {
      0%   { box-shadow: 0 0 20px 4px rgba(225,48,108,.4), 0 0 60px 15px rgba(225,48,108,.15); }
      100% { box-shadow: 0 0 30px 8px rgba(225,48,108,.6), 0 0 80px 20px rgba(225,48,108,.2); }
    }

    /* fade entrance */
    @keyframes fade-in-up {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { opacity: 0; animation: fade-in-up .8s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* status text morph */
    .status-transition {
      transition: opacity .3s ease, transform .3s ease;
    }

    /* glass */
    .glass-btn {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,.1);
    }

    /* insta ring */
    @keyframes ring-rot { to { filter: hue-rotate(360deg); } }
    .insta-ring-sm {
      background: conic-gradient(from 0deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5, #feda75);
      padding: 2px; border-radius: 50%;
      animation: ring-rot 6s linear infinite;
    }
    /* Nav logo ring for brand consistency */
    .nav-brand { display:flex; align-items:center; gap:8px; }
    .nav-brand span { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; color:#fff; }
  </style>
</head>

<body class="bg-slate-900 text-slate-200">
  <canvas id="visualizer-canvas"></canvas>

  <!-- Server notice (hidden by default) -->
  <div id="server-notice" class="hidden fixed top-6 left-1/2 -translate-x-1/2 bg-yellow-600 text-black px-4 py-2 rounded-md z-50 shadow-lg"></div>

  <div class="overlay p-6 sm:p-8">
    <!-- Header -->
    <header class="w-full flex justify-between items-center animate-fade-in-up" style="animation-delay:.2s;">
      <div id="persona-header" class="flex items-center gap-3 transition-transform duration-300 hover:scale-105 cursor-default"></div>
      <div class="flex items-center gap-2">
        <a href="/Chat.html"
          class="glass-btn hover:bg-white/10 text-white font-semibold py-2 px-4 rounded-xl flex items-center gap-2 transition-all duration-300 hover:scale-105 active:scale-95">
          <span class="material-symbols-outlined text-base">sms</span>
          <span class="hidden sm:inline">Text Chat</span>
        </a>
        <button id="settings-btn" type="button" title="Settings"
          class="glass-btn hover:bg-white/10 text-white font-semibold py-2 px-3 rounded-xl flex items-center gap-1.5 transition-all duration-300 hover:scale-105 active:scale-95">
          <span class="material-symbols-outlined text-base">settings</span>
        </button>
        <button id="logout-btn" type="button"
          class="glass-btn hover:bg-white/10 text-white font-semibold py-2 px-3 rounded-xl flex items-center gap-1.5 transition-all duration-300 hover:scale-105 active:scale-95">
          <span class="material-symbols-outlined text-base">logout</span>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </header>

  <!-- Settings modal (ElevenLabs API key) -->
  <div id="elevenlabs-modal" class="hidden fixed inset-0 z-60 flex items-center justify-center bg-black/60">
    <div class="bg-slate-900 text-slate-200 rounded-xl p-6 w-full max-w-lg glass border border-white/10">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold">ElevenLabs API Key</h3>
        <button id="elevenlabs-modal-close" class="text-gray-400 hover:text-white">✕</button>
      </div>
      <p class="text-sm text-gray-400 mb-3">Paste your ElevenLabs API key to enable high-quality TTS directly from your browser. The key is stored only in your browser's localStorage.</p>
      <label class="text-xs text-gray-400">API Key</label>
      <input id="elevenlabs-key-input" type="password" class="w-full mt-2 mb-4 p-3 rounded-lg bg-white/5 border border-white/10 text-sm" placeholder="sk-..." />
      <div class="flex justify-end gap-3">
        <button id="elevenlabs-modal-save" class="px-4 py-2 bg-primary text-white rounded-lg">Save</button>
        <button id="elevenlabs-modal-cancel" class="px-4 py-2 bg-white/5 text-white rounded-lg">Cancel</button>
      </div>
    </div>
  </div>

    <!-- Status -->
    <div class="flex-grow flex items-center justify-center text-center px-4">
      <h2 id="status-text"
        class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white drop-shadow-lg status-transition animate-fade-in-up"
        style="animation-delay:.4s;">
        Click the button to speak
      </h2>
    </div>

    <!-- Footer -->
    <footer class="flex flex-col items-center gap-5 animate-fade-in-up" style="animation-delay:.6s;">
      <button id="talk-btn"
        class="w-20 h-20 sm:w-24 sm:h-24 bg-gradient-to-br from-pink-500 via-red-500 to-yellow-500 rounded-full text-white font-bold text-lg shadow-2xl shadow-red-500/20 flex items-center justify-center talk-btn-pulse transition-all duration-300 ease-in-out hover:scale-105 active:scale-95 ring-4 ring-white/10">
        <span id="talk-btn-icon" class="material-symbols-outlined text-4xl sm:text-5xl">mic</span>
      </button>
      <p class="text-xs sm:text-sm text-slate-500">Powered by Groq &amp; ElevenLabs</p>
    </footer>
  </div>

  <script>
    // Auth helper
    function getToken() { return localStorage.getItem('token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }
    function authFetch(url, opts = {}) {
      if (!getToken()) { window.location.href = '/login.html'; return Promise.reject('No token'); }
      opts.headers = { ...authHeaders(), ...(opts.headers || {}) };
      return fetch(url, opts).then(r => {
        if (r.status === 401 || r.status === 403) { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        return r;
      });
    }
    // Verify token with server before loading
    (async () => {
      const token = getToken();
      if (!token) { window.location.href = '/login.html'; return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!r.ok) throw new Error('invalid');
      } catch (e) {
        localStorage.removeItem('token');
        localStorage.removeItem('personaData');
        window.location.href = '/login.html';
      }
    })();

    document.addEventListener('DOMContentLoaded', () => {
      // Small helper to surface server-side/TTs issues to the user
      function showServerNotice(msg, timeoutMs = 8000) {
        try {
          const el = document.getElementById('server-notice');
          if (!el) return;
          el.textContent = String(msg || '');
          el.classList.remove('hidden');
          el.classList.add('animate-fade-in-up');
          if (timeoutMs > 0) setTimeout(() => { el.classList.add('hidden'); }, timeoutMs);
        } catch (e) { console.warn('[showServerNotice] failed', e); }
      }

      const resolveApiAssetUrl = (url) => {
        if (!url) return url;
        if (/^https?:\/\//i.test(url)) return url;
        const base = (window.__API_BASE_URL__ || '').trim();
        if (!base) return url;
        return url.startsWith('/') ? `${base}${url}` : `${base}/${url}`;
      };
      const talkBtn = document.getElementById('talk-btn');
      const talkBtnIcon = document.getElementById('talk-btn-icon');
      const statusText = document.getElementById('status-text');
      const personaHeader = document.getElementById('persona-header');
      const logoutBtn = document.getElementById('logout-btn');

      let isRecording = false;
      let isSendingTranscript = false;
      let recognition = null;
      let recognitionInitialized = false;
      let lastClickTime = 0;
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      let audioContext = null;
      let analyser = null;
      let dataArray = null;
      let sourceNode = null;
      let currentMicStream = null;

      // Three.js setup
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('visualizer-canvas'), antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      camera.position.z = 5;

      const geometry = new THREE.IcosahedronGeometry(2, 3);
      const material = new THREE.MeshLambertMaterial({ color: 0x833ab4, emissive: 0xfd1d1d, wireframe: true });
      const sphere = new THREE.Mesh(geometry, material);
      scene.add(sphere);
      scene.add(new THREE.DirectionalLight(0xffffff, 1).translateX(5).translateY(5).translateZ(5));
      scene.add(new THREE.AmbientLight(0x404040));

      // Persona
      const personaData = JSON.parse(localStorage.getItem('personaData'));
      if (!personaData) {
        updateStatusText('Persona not found. Redirecting...');
        setTimeout(() => window.location.href = '/add-username.html', 2000);
        return;
      }
      const aiPersonaPicUrl = resolveApiAssetUrl(localStorage.getItem('aiPersonaPic') || 'https://via.placeholder.com/150');
      personaHeader.innerHTML = `
        <div class="insta-ring-sm">
          <div class="h-10 w-10 sm:h-11 sm:w-11 rounded-full bg-cover bg-center" style="background-image:url('${aiPersonaPicUrl}')"></div>
        </div>
        <h1 class="text-lg sm:text-xl font-bold text-white">${personaData.name || 'AI Persona'}</h1>
      `;

      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('token');
          localStorage.removeItem('userEmail');
          localStorage.removeItem('personaData');
          localStorage.removeItem('aiPersonaPic');
          window.location.href = '/login.html';
        });
      }

      function updateStatusText(newText) {
        statusText.style.opacity = '0';
        statusText.style.transform = 'translateY(-8px)';
        setTimeout(() => {
          statusText.textContent = newText;
          statusText.style.opacity = '1';
          statusText.style.transform = 'translateY(0)';
        }, 300);
      }

      function initRecognition() {
        if (!SpeechRecognition) { updateStatusText("Speech recognition not supported."); talkBtn.disabled = true; return; }
        if (recognitionInitialized) return;

        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          try {
            if (isSendingTranscript) return;
            const transcript = event.results[0][0].transcript.trim();
            if (transcript) {
              isSendingTranscript = true;
              updateStatusText(`"${transcript}"`);
              isRecording = false;
              talkBtnIcon.textContent = 'mic';
              talkBtn.disabled = true;
              talkBtn.classList.remove('talk-btn-pulse', 'recording-active');
              try { recognition.stop(); } catch (e) {}
              sendTranscriptToServer(transcript).finally(() => { isSendingTranscript = false; });
            } else { stopListening(); }
          } catch (err) { console.error('[recognition.onresult]', err); stopListening(); isSendingTranscript = false; }
        };

        recognition.onerror = (event) => {
          console.error('[recognition] error', event.error);
          updateStatusText(event.error === 'no-speech' || event.error === 'aborted' ? "Click the button to speak" : "Sorry, I didn't catch that.");
          stopListening();
          isSendingTranscript = false;
        };

        recognition.onend = () => {
          if (isRecording) {
            isRecording = false;
            talkBtnIcon.textContent = 'mic';
            talkBtn.disabled = false;
            talkBtn.classList.add('talk-btn-pulse');
            talkBtn.classList.remove('recording-active');
            if (!isSendingTranscript) updateStatusText("Click the button to speak");
          }
        };

        recognitionInitialized = true;
      }

      initRecognition();

      async function startListening() {
        if (!SpeechRecognition || isRecording) return;
        if (!recognitionInitialized) initRecognition();
        try {
          isRecording = true;
          talkBtn.disabled = true;
          talkBtn.classList.remove('talk-btn-pulse');
          talkBtn.classList.add('recording-active');
          talkBtnIcon.textContent = 'stop';
          updateStatusText("Listening...");
          await setupMicrophoneVisualizer();
          recognition.start();
        } catch (err) {
          console.error('[startListening]', err);
          isRecording = false;
          talkBtn.disabled = false;
          talkBtnIcon.textContent = 'mic';
          talkBtn.classList.add('talk-btn-pulse');
          talkBtn.classList.remove('recording-active');
          updateStatusText("Click the button to speak");
        }
      }

      function stopListening(isProcessing = false) {
        try { recognition?.stop?.() || recognition?.abort?.(); } catch (e) {}
        cleanupMicrophone();
        isRecording = false;
        talkBtnIcon.textContent = 'mic';
        talkBtn.classList.remove('recording-active');
        if (!isProcessing) {
          talkBtn.disabled = false;
          talkBtn.classList.add('talk-btn-pulse');
          updateStatusText("Click the button to speak");
        } else {
          talkBtn.disabled = true;
        }
      }

      function cleanupMicrophone() {
        if (currentMicStream) {
          currentMicStream.getTracks().forEach(t => t.stop());
          currentMicStream = null;
        }
      }

      talkBtn.addEventListener('click', () => {
        const now = Date.now();
        if (now - lastClickTime < 500) return;
        lastClickTime = now;
        if (isRecording) stopListening(false);
        else startListening();
      });

      async function sendTranscriptToServer(transcript) {
        updateStatusText("Thinking...");
        talkBtn.disabled = true;
        try {
          const response = await authFetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: transcript })
          });
          const data = await response.json();
          // Debug: log full server response for TTS investigation
          try { console.debug('[voice-chat] /chat response', data); } catch (e) {}
          if (!response.ok) {
            if (response.status === 429) {
              await new Promise(r => setTimeout(r, 2000));
              const retry = await authFetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: transcript }) });
              if (!retry.ok) {
                const retryData = await retry.json().catch(() => ({}));
                const retryAfterSec = parseInt(retryData.retryAfterSec || '0', 10) || 0;
                const waitHint = retryAfterSec > 0 ? ` Please wait about ${retryAfterSec}s.` : ' Please wait a bit.';
                throw new Error((retryData.error || "Sorry, I'm a bit busy right now.") + waitHint);
              }
              await handleServerResponse(await retry.json());
              return;
            }
            throw new Error(data.error || 'Server error');
          }
          await handleServerResponse(data);
        } catch (error) {
          console.error("Server error:", error);
          updateStatusText(`Error: ${error.message}`);
          stopListening();
        } finally {
          if (!isRecording) {
            setTimeout(() => { talkBtn.disabled = false; talkBtn.classList.add('talk-btn-pulse'); }, 200);
          }
        }
      }

      async function handleServerResponse(data) {
        // Debug: expose received response and audioUrl
        try { console.debug('[voice-chat] handleServerResponse data:', data); } catch (e) {}
        const textResponse = String(data?.response || '').trim();
        const speakWithBrowserTTS = async (text) => {
          if (!text || !('speechSynthesis' in window)) return false;
          return await new Promise((resolve) => {
            try {
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.rate = 1.0;
              utterance.pitch = 1.0;
              utterance.lang = 'en-US';
              utterance.onend = () => resolve(true);
              utterance.onerror = () => resolve(false);
              window.speechSynthesis.cancel();
              window.speechSynthesis.speak(utterance);
            } catch (e) {
              resolve(false);
            }
          });
        };

        let audioUrl = data.audioUrl;
        if (!audioUrl && Array.isArray(data.history) && data.history.length) {
          audioUrl = data.history[data.history.length - 1]?.audioUrl || null;
        }
        // If the server returned an audioUrl, play it. Otherwise, if the server
        // returned voice config, attempt to request a short-lived TTS token and
        // call ElevenLabs directly from the browser.
        if (audioUrl) {
          try { console.debug('[voice-chat] Received audioUrl:', audioUrl); } catch (e) {}
          const base = (window.__API_BASE_URL__ || '').trim();
          const resolveApiUrl = (u) => {
            if (!u) return u;
            if (/^https?:\/\//i.test(u)) return u;
            if (!base) return u;
            return u.startsWith('/') ? `${base}${u}` : `${base}/${u}`;
          };
          const proxiedUrl = /^https?:\/\//i.test(audioUrl)
            ? resolveApiUrl(`/audio-proxy?url=${encodeURIComponent(audioUrl)}`)
            : resolveApiUrl(audioUrl);
          const played = await playAIResponse(proxiedUrl);
          if (!played) {
            updateStatusText("Speaking (fallback)...");
            const spoken = await speakWithBrowserTTS(textResponse);
            if (!spoken) {
              updateStatusText("No audio received");
              stopListening();
              return;
            }
            updateStatusText("Listening...");
            setTimeout(async () => {
              try { await startListening(); } catch (_) {
                updateStatusText("Click the button to speak");
                talkBtn.disabled = false;
                talkBtn.classList.add('talk-btn-pulse');
                talkBtnIcon.textContent = 'mic';
              }
            }, 300);
          }
        } else if (data.voiceId) {
          // Attempt client-side ElevenLabs: request a short-lived token then call the API
          try {
            showServerNotice('Generating audio via ElevenLabs in your browser...', 5000);
            const played = await requestTtsAndPlay(textResponse, data.voiceId, data.modelId, data.voiceSettings);
            if (played) return; // audio played — done
            // else fall through to browser TTS fallback
            console.warn('[voice-chat] Client-side ElevenLabs call failed; falling back to browser TTS');
            showServerNotice('Client-side ElevenLabs failed; using browser TTS fallback.', 6000);
          } catch (err) {
            console.error('[voice-chat] client-side TTS error', err);
            showServerNotice('Client-side ElevenLabs failed; using browser TTS fallback.', 6000);
          }

          // Browser TTS fallback
          updateStatusText("Speaking (fallback)...");
          const spoken = await speakWithBrowserTTS(textResponse);
          if (!spoken) {
            updateStatusText("No audio received");
            stopListening();
            return;
          }
          updateStatusText("Listening...");
          setTimeout(async () => {
            try { await startListening(); } catch (_) {
              updateStatusText("Click the button to speak");
              talkBtn.disabled = false;
              talkBtn.classList.add('talk-btn-pulse');
              talkBtnIcon.textContent = 'mic';
            }
          }, 300);
        } else {
          // No audioUrl and no voice config — final fallback to browser TTS
          console.warn('[voice-chat] No audioUrl or voice config in server response; using browser TTS');
          showServerNotice('No TTS available; using browser TTS fallback.', 6000);
          updateStatusText("Speaking (fallback)...");
          const spoken = await speakWithBrowserTTS(textResponse);
          if (!spoken) {
            updateStatusText("No audio received");
            stopListening();
            return;
          }
          updateStatusText("Listening...");
          setTimeout(async () => {
            try { await startListening(); } catch (_) {
              updateStatusText("Click the button to speak");
              talkBtn.disabled = false;
              talkBtn.classList.add('talk-btn-pulse');
              talkBtnIcon.textContent = 'mic';
            }
          }, 300);
        }
      }

      // Client-side ElevenLabs TTS using user-provided key in localStorage
      async function requestTtsAndPlay(text, voiceId, modelId, voiceSettings) {
        try {
          console.debug('[TTS] Using browser-side ElevenLabs request');
          const apiKey = localStorage.getItem('ELEVEN_API_KEY');
          if (!apiKey) {
            // Prompt user to add key
            openElevenLabsModal();
            return false;
          }

          const elevenUrl = `https://api.elevenlabs.io/v1/text-to-speech/${encodeURIComponent(voiceId)}`;
          const payload = {
            text: String(text || ''),
            model_id: 'eleven_multilingual_v2',
            voice_settings: voiceSettings || {}
          };

          const resp = await fetch(elevenUrl, {
            method: 'POST',
            headers: {
              'xi-api-key': apiKey,
              'Accept': 'audio/mpeg',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!resp.ok) {
            const txt = await resp.text().catch(() => '');
            console.warn('[requestTtsAndPlay] ElevenLabs responded with', resp.status, txt.substring(0, 400));
            if (resp.status === 402) {
              console.warn('[requestTtsAndPlay] received 402 paid_plan_required, retrying with default voice id');
              const defaultVoice = 'JBFqnCBsd6RMkjVDRZzb';
              if (defaultVoice && defaultVoice !== voiceId) {
                try {
                  const retryPlayed = await requestTtsAndPlay(text, defaultVoice, modelId, voiceSettings);
                  return retryPlayed;
                } catch (e) { console.error('[requestTtsAndPlay] retry error', e); }
              }
            }
            return false;
          }

          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const played = await playAIResponse(url);
          setTimeout(() => { try { URL.revokeObjectURL(url); } catch (e) {} }, 60000);
          return played;
        } catch (err) {
          console.error('[requestTtsAndPlay] error', err);
          return false;
        }
      }

      // Modal helpers and settings button handlers
      function openElevenLabsModal() {
        const modal = document.getElementById('elevenlabs-modal');
        const input = document.getElementById('elevenlabs-key-input');
        if (!modal) return;
        input.value = localStorage.getItem('ELEVEN_API_KEY') || '';
        modal.classList.remove('hidden');
      }
      function closeElevenLabsModal() {
        const modal = document.getElementById('elevenlabs-modal');
        if (!modal) return;
        modal.classList.add('hidden');
      }

      // Wire settings UI
      const settingsBtn = document.getElementById('settings-btn');
      const modalClose = document.getElementById('elevenlabs-modal-close');
      const modalCancel = document.getElementById('elevenlabs-modal-cancel');
      const modalSave = document.getElementById('elevenlabs-modal-save');
      settingsBtn?.addEventListener('click', () => openElevenLabsModal());
      modalClose?.addEventListener('click', () => closeElevenLabsModal());
      modalCancel?.addEventListener('click', () => closeElevenLabsModal());
      modalSave?.addEventListener('click', () => {
        const input = document.getElementById('elevenlabs-key-input');
        if (!input) return;
        const key = String(input.value || '').trim();
        if (!key) {
          showServerNotice('API key cannot be empty', 3000);
          return;
        }
        localStorage.setItem('ELEVEN_API_KEY', key);
        showServerNotice('Saved ElevenLabs API key (local only)', 2500);
        closeElevenLabsModal();
      });

      async function playAIResponse(audioUrl) {
        updateStatusText("Speaking...");
        const audio = new Audio(audioUrl);
        audio.crossOrigin = 'anonymous';
        try { setupAudioPlaybackVisualizer(audio); } catch (e) {}
        try {
          await audio.play();
          await new Promise(resolve => { audio.onended = resolve; });
          updateStatusText("Listening...");
          setTimeout(async () => {
            try { await startListening(); } catch (err) {
              updateStatusText("Click the button to speak");
              talkBtn.disabled = false;
              talkBtn.classList.add('talk-btn-pulse');
              talkBtnIcon.textContent = 'mic';
            }
          }, 400);
          return true;
        } catch (err) {
          console.error("Audio error:", err);
          return false;
        } finally {
          sourceNode = null;
        }
      }

      // Audio visualizer helpers
      async function setupMicrophoneVisualizer() {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        try {
          if (sourceNode) { try { sourceNode.disconnect(); } catch (e) {} sourceNode = null; }
          cleanupMicrophone();
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          currentMicStream = stream;
          sourceNode = audioContext.createMediaStreamSource(stream);
          setupAnalyser(false);
        } catch (err) { console.error('[mic visualizer]', err); }
      }

      function setupAudioPlaybackVisualizer(audioElement) {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        try {
          if (sourceNode) { try { sourceNode.disconnect(); } catch (e) {} sourceNode = null; }
          cleanupMicrophone();
          sourceNode = audioContext.createMediaElementSource(audioElement);
          setupAnalyser(true);
        } catch (err) { console.error('[playback visualizer]', err); }
      }

      function setupAnalyser(connectToDestination = false) {
        if (!audioContext || !sourceNode) return;
        if (analyser) { try { analyser.disconnect(); } catch (e) {} }
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        try {
          sourceNode.connect(analyser);
          if (connectToDestination) analyser.connect(audioContext.destination);
        } catch (err) {}
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }

      // Animation loop
      const originalVertices = geometry.attributes.position.clone();
      function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.0005;
        if (analyser && sourceNode) {
          analyser.getByteFrequencyData(dataArray);
          const pos = geometry.attributes.position;
          for (let i = 0; i < pos.count; i++) {
            const v = new THREE.Vector3().fromBufferAttribute(originalVertices, i);
            const loudness = dataArray[i % dataArray.length] / 255;
            v.normalize().multiplyScalar(2 + loudness * 0.5);
            pos.setXYZ(i, v.x, v.y, v.z);
          }
          geometry.attributes.position.needsUpdate = true;
          geometry.computeVertexNormals();
        } else {
          sphere.position.y = Math.sin(time) * 0.1;
        }
        sphere.rotation.y += 0.001;
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });
    });
  </script>
</body>
