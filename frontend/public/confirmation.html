<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AI Persona &mdash; Confirm</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/config.js"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    body { font-family: 'Space Grotesk', sans-serif; }

    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animated-gradient-bg {
      background: linear-gradient(-45deg, #0a0a0a, #1a0a2e, #120a1e, #0d0d0d, #1c0818);
      background-size: 400% 400%;
      animation: gradient-shift 18s ease infinite;
    }

    .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: .2; pointer-events: none; }
    @keyframes float-1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-60px) scale(1.15)} }
    @keyframes float-2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-50px,40px) scale(1.1)} }

    .grid-pattern {
      background-image: radial-gradient(circle, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 30px 30px;
    }

    .glass {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid rgba(255,255,255,.08);
    }

    .gradient-text {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .btn-shimmer {
      background-size: 200% auto;
      background-image: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045, #fd1d1d, #833ab4);
      animation: shimmer 4s linear infinite;
    }

    /* Instagram gradient ring around avatar */
    @keyframes ring-rotate { to { transform: rotate(360deg); } }
    .insta-ring {
      background: conic-gradient(from 0deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5, #feda75);
      padding: 3px;
      border-radius: 50%;
      animation: ring-rotate 4s linear infinite;
    }

    /* card entrance */
    @keyframes fade-up {
      0%   { opacity: 0; transform: translateY(24px) scale(.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-fade-up { animation: fade-up .7s cubic-bezier(.22,1,.36,1) forwards; opacity: 0; }
    .delay-1 { animation-delay: .15s; }
    .delay-2 { animation-delay: .3s; }
    .delay-3 { animation-delay: .45s; }

    /* avatar float */
    @keyframes avatar-float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-6px); }
    }
    .avatar-float { animation: avatar-float 3s ease-in-out infinite; }
    /* posts grid */
    .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; border-radius: 12px; overflow: hidden; }
    .post-thumb { position: relative; aspect-ratio: 1; overflow: hidden; cursor: pointer; }
    .post-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s ease, filter .3s ease; }
    .post-thumb:hover img { transform: scale(1.08); filter: brightness(0.7); }
    .post-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 12px; opacity: 0; transition: opacity .3s ease; pointer-events: none; }
    .post-thumb:hover .post-overlay { opacity: 1; }
    .post-stat { display: flex; align-items: center; gap: 3px; font-size: 13px; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.6); }

    @keyframes skeleton-pulse { 0%,100%{opacity:.15} 50%{opacity:.3} }
    .skeleton { background: rgba(255,255,255,.08); animation: skeleton-pulse 1.5s ease-in-out infinite; border-radius: 4px; }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { primary: "#e1306c", accent: "#833ab4", "background-dark": "#0a0a0a" },
          fontFamily: { display: ["Space Grotesk", "sans-serif"] },
          borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
        },
      },
    };
  </script>
</head>

<body class="animated-gradient-bg font-display text-slate-200 overflow-x-hidden">
  <!-- orbs -->
  <div class="orb w-[500px] h-[500px] bg-[#833ab4]/30 top-[-100px] left-[-150px] fixed" style="animation:float-1 12s ease-in-out infinite"></div>
  <div class="orb w-[400px] h-[400px] bg-[#fd1d1d]/20 bottom-[-80px] right-[-100px] fixed" style="animation:float-2 14s ease-in-out infinite"></div>

  <div class="relative flex flex-col min-h-screen grid-pattern">
    <!-- header -->
    <header class="w-full sticky top-0 z-50 backdrop-blur-xl bg-black/30 border-b border-white/5">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <a href="/" class="flex items-center gap-3 group">
            <span class="material-symbols-outlined text-primary text-xl">smart_toy</span>
            <h1 class="text-xl font-bold text-white">AI Persona</h1>
          </a>
        </div>
      </div>
    </header>

    <!-- main -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
      <div class="max-w-md w-full">
        <div class="glass rounded-2xl p-8 md:p-10 shadow-2xl shadow-primary/5 animate-fade-up">
          <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight text-center mb-2 animate-fade-up delay-1">
            Confirm <span class="gradient-text">Persona</span>
          </h2>
          <p class="text-sm text-gray-400 text-center mb-8 animate-fade-up delay-1">
            Review the profile below and confirm to start chatting.
          </p>

          <!-- profile card -->
          <div id="profile-details" class="flex flex-col items-center gap-4 mb-8 animate-fade-up delay-2">
            <div class="avatar-float">
              <div class="insta-ring">
                <img id="profile-pic" class="w-24 h-24 rounded-full object-cover bg-slate-800" src="https://via.placeholder.com/150" alt="Profile Picture" />
              </div>
            </div>
            <div class="text-center">
              <p id="full-name" class="text-xl font-bold text-white"></p>
              <p id="username" class="text-sm font-semibold text-primary tracking-wide mt-0.5"></p>
            </div>
          </div>

          <!-- bio -->
          <div class="bg-white/5 border border-white/5 rounded-xl p-5 mb-8 animate-fade-up delay-2">
            <p class="flex items-center gap-2 text-xs text-gray-500 uppercase tracking-wider font-semibold mb-2">
              <span class="material-symbols-outlined text-sm">description</span> Bio
            </p>
            <p id="bio" class="text-sm text-gray-300 leading-relaxed"></p>
          </div>

          <!-- actions -->
          <div class="flex flex-col sm:flex-row items-center justify-center gap-3 animate-fade-up delay-3">
            <button id="confirmBtn"
              class="w-full sm:w-auto btn-shimmer text-white font-bold text-base py-3 px-10 rounded-xl shadow-lg shadow-primary/25 hover:shadow-primary/40 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">check_circle</span>
              Confirm
            </button>
            <a href="/add-username.html"
              class="w-full sm:w-auto bg-white/5 border border-white/10 text-gray-300 font-bold text-base py-3 px-10 rounded-xl hover:bg-white/10 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2">
              <span class="material-symbols-outlined text-lg">edit</span>
              Edit
            </a>
          </div>
        </div>

        <!-- back -->
        <div class="text-center mt-6 animate-fade-up" style="animation-delay:.5s">
          <a href="/add-username.html" class="text-sm text-gray-500 hover:text-primary transition-colors duration-300 inline-flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            Change username
          </a>
        </div>

        <!-- Instagram Posts Section -->
        <div id="posts-section" class="mt-8 animate-fade-up" style="animation-delay:.6s">
          <div class="glass rounded-2xl p-6 shadow-2xl shadow-primary/5">
            <h3 class="text-lg font-bold text-white flex items-center gap-2 mb-4">
              <span class="material-symbols-outlined text-primary">grid_view</span>
              Recent Posts
            </h3>

            <!-- loading skeleton -->
            <div id="posts-loading" class="posts-grid">
              <div class="post-thumb skeleton" style="aspect-ratio:1"></div>
              <div class="post-thumb skeleton" style="aspect-ratio:1"></div>
              <div class="post-thumb skeleton" style="aspect-ratio:1"></div>
              <div class="post-thumb skeleton" style="aspect-ratio:1"></div>
              <div class="post-thumb skeleton" style="aspect-ratio:1"></div>
              <div class="post-thumb skeleton" style="aspect-ratio:1"></div>
            </div>

            <!-- actual grid -->
            <div id="posts-grid" class="posts-grid" style="display:none"></div>

            <!-- message for private / unavailable -->
            <div id="posts-message" class="hidden text-center py-8">
              <span class="material-symbols-outlined text-4xl text-gray-600 mb-2 block">lock</span>
              <p id="posts-message-text" class="text-sm text-gray-400"></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Auth guard â€” verify token with server
    (async () => {
      const token = localStorage.getItem('token');
      if (!token) { window.location.href = '/login.html'; return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!r.ok) throw new Error('invalid');
      } catch (e) {
        localStorage.removeItem('token');
        localStorage.removeItem('personaData');
        window.location.href = '/login.html';
      }
    })();

    document.addEventListener('DOMContentLoaded', () => {
      const personaData = JSON.parse(localStorage.getItem('personaData'));
      const profilePicElement = document.getElementById('profile-pic');
      const placeholderPic = 'https://via.placeholder.com/150';
      const apiBase = (window.__API_BASE_URL__ || '').trim();
      const resolveApiAssetUrl = (url) => {
        if (!url) return url;
        if (/^https?:\/\//i.test(url)) return url;
        if (!apiBase) return url;
        return url.startsWith('/') ? `${apiBase}${url}` : `${apiBase}/${url}`;
      };

      if (personaData && personaData.profile_pic_url) {
        const proxyUrl = resolveApiAssetUrl(`/api/image-proxy?url=${encodeURIComponent(personaData.profile_pic_url)}`);
        profilePicElement.src = proxyUrl;
        profilePicElement.alt = `Profile picture of ${personaData.name}`;
        document.getElementById('full-name').textContent = personaData.name;
        document.getElementById('username').textContent = `@${personaData.username}`;
        document.getElementById('bio').textContent = personaData.bio || 'No bio available.';
        localStorage.setItem('aiPersonaPic', proxyUrl);
      } else if (personaData) {
        profilePicElement.src = placeholderPic;
        profilePicElement.alt = `Profile picture of ${personaData.name}`;
        document.getElementById('full-name').textContent = personaData.name;
        document.getElementById('username').textContent = `@${personaData.username}`;
        document.getElementById('bio').textContent = personaData.bio || 'No bio available.';
        localStorage.setItem('aiPersonaPic', placeholderPic);
      } else {
        window.location.href = '/add-username.html';
        return;
      }

      // Confirm: session is already set from add-username page, just redirect
      document.getElementById('confirmBtn').addEventListener('click', () => {
        const persona = JSON.parse(localStorage.getItem('personaData'));
        if (!persona || !persona.username) {
          alert('Persona data missing â€” please add username first.');
          window.location.href = '/add-username.html';
          return;
        }
        window.location.href = '/chat';
      });

      // â”€â”€ Fetch Instagram Posts â”€â”€
      if (personaData && personaData.username) {
        fetchPosts(personaData.username);
      }
    });

    function formatCount(n) {
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'K';
      return String(n);
    }

    async function fetchPosts(username) {
      const loading = document.getElementById('posts-loading');
      const grid    = document.getElementById('posts-grid');
      const msgBox  = document.getElementById('posts-message');
      const msgText = document.getElementById('posts-message-text');

      try {
        const res = await fetch(`/instagram-posts?username=${encodeURIComponent(username)}&limit=12`);
        const data = await res.json();

        if (res.status === 429) {
          loading.style.display = 'none';
          msgBox.classList.remove('hidden');
          const retryAfterSec = parseInt(data.retryAfterSec || '0', 10) || 0;
          const waitHint = retryAfterSec > 0 ? ` Please wait about ${retryAfterSec}s and try again.` : ' Please wait a bit and try again.';
          msgText.textContent =
            (data.error || "Sorry, we're temporarily rate-limited while loading posts.") + waitHint;
          return;
        }

        loading.style.display = 'none';

        // If API returned a message (private / error)
        if (data.message || !data.posts || data.posts.length === 0) {
          msgBox.classList.remove('hidden');
          msgText.textContent = data.message || `No posts found for @${username}.`;
          return;
        }

        // Render posts
        data.posts.forEach(post => {
          const thumb = document.createElement('div');
          thumb.className = 'post-thumb';

          const proxyImg = resolveApiAssetUrl(`/api/image-proxy?url=${encodeURIComponent(post.image_url)}`);

          thumb.innerHTML = `
            <img src="${proxyImg}" alt="${post.caption?.substring(0, 60) || 'Instagram post'}" loading="lazy" />
            <div class="post-overlay">
              <span class="post-stat"><span class="material-symbols-outlined" style="font-size:16px">favorite</span> ${formatCount(post.like_count)}</span>
              <span class="post-stat"><span class="material-symbols-outlined" style="font-size:16px">chat_bubble</span> ${formatCount(post.comment_count)}</span>
            </div>`;
          grid.appendChild(thumb);
        });

        grid.style.display = 'grid';
      } catch (err) {
        console.error('Failed to load posts:', err);
        loading.style.display = 'none';
        msgBox.classList.remove('hidden');
        msgText.textContent = 'Could not load Instagram posts at this time.';
      }
    }
  </script>
</body>
</html>
