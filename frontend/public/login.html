<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Persona &mdash; Login / Sign Up</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/config.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .bg-animate {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 25%, #0f172a 50%, #1a0a2e 75%, #0f172a 100%);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: .35; pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; top: -10%; left: -5%; background: #833ab4; animation-delay: 0s; }
    .orb-2 { width: 350px; height: 350px; bottom: -8%; right: -5%; background: #fd1d1d; animation-delay: -3s; }
    .orb-3 { width: 280px; height: 280px; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fcb045; animation-delay: -6s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-30px) scale(1.05); }
    }

    .glass {
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.1);
    }

    @keyframes card-enter {
      0%   { opacity: 0; transform: translateY(40px) scale(.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-enter { animation: card-enter .8s cubic-bezier(.22,1,.36,1) forwards; }

    .btn-shimmer {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045, #833ab4);
      background-size: 300% 300%;
      animation: shimmer 4s ease infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .gradient-text {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .insta-ring {
      background: conic-gradient(from 0deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5, #feda75);
      padding: 3px; border-radius: 50%;
      animation: ring-rotate 6s linear infinite;
    }
    @keyframes ring-rotate {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .input-glow:focus-within {
      box-shadow: 0 0 0 2px rgba(225,48,108,.35), 0 0 20px -4px rgba(131,58,180,.2);
    }

    /* tabs */
    .tab-btn { transition: all .3s ease; position: relative; }
    .tab-btn.active { color: #e1306c; }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045);
    }

    /* form slide */
    .form-panel { transition: opacity .4s ease, transform .4s ease; }
    .form-panel.hidden-panel { opacity: 0; transform: translateY(12px); pointer-events: none; position: absolute; }
    .form-panel.active-panel { opacity: 1; transform: translateY(0); pointer-events: auto; position: relative; }

    /* spinner */
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .spinner { animation: spin-slow .8s linear infinite; }
  </style>
</head>

<body class="bg-animate text-slate-200 min-h-screen flex flex-col items-center justify-center relative">
  <!-- Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main Card -->
  <div class="relative z-10 w-full max-w-md mx-auto px-4 sm:px-0">
    <div class="glass rounded-3xl p-8 sm:p-10 card-enter shadow-2xl shadow-purple-500/10">
      <!-- Logo -->
      <div class="flex justify-center mb-6">
        <div class="insta-ring">
          <div class="w-20 h-20 rounded-full bg-slate-900 flex items-center justify-center">
            <span class="material-symbols-outlined text-4xl gradient-text" style="-webkit-text-fill-color:unset; background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
              smart_toy
            </span>
          </div>
        </div>
      </div>

      <h1 class="text-2xl sm:text-3xl font-bold text-center text-white mb-1">
        Launch Your <span class="gradient-text">AI Persona</span>
      </h1>
      <p class="text-center text-slate-400 mb-6 text-sm">Create realistic IG-style voice personas in minutes.</p>

      <!-- Tabs -->
      <div class="flex justify-center gap-8 mb-6 border-b border-white/10 pb-3">
        <button id="tab-login" class="tab-btn active text-sm font-semibold text-white pb-1" onclick="switchTab('login')">Log In</button>
        <button id="tab-signup" class="tab-btn text-sm font-semibold text-slate-400 pb-1" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Login Form -->
      <div id="panel-login" class="form-panel active-panel">
        <form id="login-form" class="space-y-4" onsubmit="return false;">
          <div class="relative input-glow rounded-xl transition-all duration-300">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-500 text-lg">mail</span>
            </div>
            <input id="login-email" type="email" required autocomplete="email"
              class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-0 focus:border-pink-500/50 outline-none transition-all duration-300"
              placeholder="Email address" />
          </div>
          <div class="relative input-glow rounded-xl transition-all duration-300">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-500 text-lg">lock</span>
            </div>
            <input id="login-password" type="password" required autocomplete="current-password" minlength="6"
              class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-0 focus:border-pink-500/50 outline-none transition-all duration-300"
              placeholder="Password" />
          </div>
          <button type="submit" id="login-btn"
            class="w-full btn-shimmer text-white font-bold text-base py-3.5 px-6 rounded-xl shadow-lg shadow-pink-500/20 transition-all duration-300 hover:scale-[1.02] hover:shadow-xl hover:shadow-pink-500/30 active:scale-[.98] flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-xl">login</span>
            Log In
          </button>
        </form>
      </div>

      <!-- Sign Up Form -->
      <div id="panel-signup" class="form-panel hidden-panel">
        <form id="signup-form" class="space-y-4" onsubmit="return false;">
          <div class="relative input-glow rounded-xl transition-all duration-300">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-500 text-lg">mail</span>
            </div>
            <input id="signup-email" type="email" required autocomplete="email"
              class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-0 focus:border-pink-500/50 outline-none transition-all duration-300"
              placeholder="Email address" />
          </div>
          <div class="relative input-glow rounded-xl transition-all duration-300">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-500 text-lg">lock</span>
            </div>
            <input id="signup-password" type="password" required autocomplete="new-password" minlength="6"
              class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-0 focus:border-pink-500/50 outline-none transition-all duration-300"
              placeholder="Password (min 6 chars)" />
          </div>
          <div class="relative input-glow rounded-xl transition-all duration-300">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-gray-500 text-lg">lock</span>
            </div>
            <input id="signup-confirm" type="password" required autocomplete="new-password" minlength="6"
              class="w-full pl-11 pr-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:ring-0 focus:border-pink-500/50 outline-none transition-all duration-300"
              placeholder="Confirm password" />
          </div>
          <button type="submit" id="signup-btn"
            class="w-full btn-shimmer text-white font-bold text-base py-3.5 px-6 rounded-xl shadow-lg shadow-pink-500/20 transition-all duration-300 hover:scale-[1.02] hover:shadow-xl hover:shadow-pink-500/30 active:scale-[.98] flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-xl">person_add</span>
            Create Account
          </button>
        </form>
      </div>

      <div id="google-auth-section" class="mt-5">
        <div class="flex items-center gap-3 text-xs text-slate-400">
          <div class="h-px flex-1 bg-white/10"></div>
          <span>or continue with</span>
          <div class="h-px flex-1 bg-white/10"></div>
        </div>
        <div id="google-btn-wrap" class="mt-4 flex justify-center">
          <button id="google-fallback-btn" type="button" disabled
            class="h-10 px-5 rounded-full border border-white/20 text-sm text-slate-300 bg-white/5 cursor-not-allowed">
            Google Sign-In Unavailable
          </button>
        </div>
        <p id="google-auth-hint" class="hidden mt-3 text-center text-xs text-amber-300/90"></p>
      </div>

      <!-- Error / Success Message -->
      <div id="auth-message" class="hidden mt-4 p-3 rounded-xl text-sm flex items-start gap-2"></div>

      <!-- Loading -->
      <div id="auth-loading" class="hidden mt-4 flex justify-center">
        <div class="w-8 h-8 rounded-full border-[3px] border-pink-500/20 border-t-pink-500 spinner"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <p class="relative z-10 text-xs text-slate-600 mt-6">&copy; 2025 AI Persona. Powered by Groq &amp; ElevenLabs</p>

  <script>
    let googleAuthEnabled = false;
    let googleClientId = null;
    let googleButtonRendered = false;

    function apiUrl(path) {
      const base = (window.__API_BASE_URL__ || '').trim();
      if (!base || /^https?:\/\//i.test(path)) return path;
      return `${base}${path}`;
    }

    function setGoogleHint(message) {
      const hint = document.getElementById('google-auth-hint');
      if (!hint) return;
      if (!message) {
        hint.classList.add('hidden');
        hint.textContent = '';
        return;
      }
      hint.textContent = message;
      hint.classList.remove('hidden');
    }

    // If already logged in, verify token then redirect
    (async () => {
      const token = localStorage.getItem('token');
      if (token) {
        try {
          const r = await fetch(apiUrl('/api/auth/me'), { headers: { 'Authorization': 'Bearer ' + token } });
          if (r.ok) { window.location.href = '/add-username.html'; return; }
        } catch (e) {}
        localStorage.removeItem('token');
        localStorage.removeItem('personaData');
      }
    })();

    async function loadGoogleAuthConfig() {
      try {
        const res = await fetch(apiUrl('/api/auth/google/config'));
        if (!res.ok) {
          setGoogleHint('Google sign-in is unavailable right now.');
          return;
        }
        const data = await res.json();
        googleAuthEnabled = Boolean(data.enabled && data.clientId);
        googleClientId = googleAuthEnabled ? data.clientId : null;
        if (!googleAuthEnabled) setGoogleHint('Google sign-in is disabled on backend. Add GOOGLE_CLIENT_ID.');
        else setGoogleHint('');
      } catch (_) {
        setGoogleHint('Google sign-in requires backend API access. Set API_BASE_URL in /config.js.');
      }
    }

    async function handleGoogleCredential(response) {
      const credential = String(response?.credential || '').trim();
      if (!credential) {
        showMessage('Google sign-in failed. Please retry.');
        return;
      }
      setLoading(true);
      document.getElementById('auth-message').classList.add('hidden');
      try {
        const res = await fetch(apiUrl('/api/auth/google'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential })
        });
        const data = await res.json();
        if (!res.ok) {
          showMessage(data.error || 'Google sign-in failed.');
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        showMessage('Google sign-in successful! Redirecting...', false);
        setTimeout(() => { window.location.href = '/add-username.html'; }, 600);
      } catch (_) {
        showMessage('Network error. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    function maybeRenderGoogleButton() {
      if (!googleAuthEnabled || googleButtonRendered) return;
      if (!(window.google && window.google.accounts && window.google.accounts.id)) return;

      const section = document.getElementById('google-auth-section');
      const wrap = document.getElementById('google-btn-wrap');
      if (!section || !wrap) return;

      window.google.accounts.id.initialize({
        client_id: googleClientId,
        callback: handleGoogleCredential,
        auto_select: false,
        cancel_on_tap_outside: true
      });

      wrap.innerHTML = '';
      window.google.accounts.id.renderButton(wrap, {
        type: 'standard',
        theme: 'outline',
        size: 'large',
        text: 'continue_with',
        shape: 'pill'
      });
      googleButtonRendered = true;
    }

    function switchTab(tab) {
      const loginTab = document.getElementById('tab-login');
      const signupTab = document.getElementById('tab-signup');
      const loginPanel = document.getElementById('panel-login');
      const signupPanel = document.getElementById('panel-signup');
      const msgEl = document.getElementById('auth-message');
      msgEl.classList.add('hidden');

      if (tab === 'login') {
        loginTab.classList.add('active'); loginTab.classList.remove('text-slate-400'); loginTab.classList.add('text-white');
        signupTab.classList.remove('active'); signupTab.classList.add('text-slate-400'); signupTab.classList.remove('text-white');
        loginPanel.classList.remove('hidden-panel'); loginPanel.classList.add('active-panel');
        signupPanel.classList.add('hidden-panel'); signupPanel.classList.remove('active-panel');
      } else {
        signupTab.classList.add('active'); signupTab.classList.remove('text-slate-400'); signupTab.classList.add('text-white');
        loginTab.classList.remove('active'); loginTab.classList.add('text-slate-400'); loginTab.classList.remove('text-white');
        signupPanel.classList.remove('hidden-panel'); signupPanel.classList.add('active-panel');
        loginPanel.classList.add('hidden-panel'); loginPanel.classList.remove('active-panel');
      }
    }

    function showMessage(text, isError = true) {
      const el = document.getElementById('auth-message');
      el.classList.remove('hidden');
      el.className = `mt-4 p-3 rounded-xl text-sm flex items-start gap-2 ${isError ? 'bg-red-500/10 border border-red-500/20 text-red-300' : 'bg-green-500/10 border border-green-500/20 text-green-300'}`;
      el.innerHTML = `<span class="material-symbols-outlined shrink-0 text-base">${isError ? 'error' : 'check_circle'}</span><span>${text}</span>`;
    }

    function setLoading(isLoading) {
      document.getElementById('auth-loading').classList.toggle('hidden', !isLoading);
      document.getElementById('login-btn').disabled = isLoading;
      document.getElementById('signup-btn').disabled = isLoading;
      if (isLoading) {
        document.getElementById('login-btn').style.opacity = '0.6';
        document.getElementById('signup-btn').style.opacity = '0.6';
      } else {
        document.getElementById('login-btn').style.opacity = '1';
        document.getElementById('signup-btn').style.opacity = '1';
      }
    }

    // Login
    document.getElementById('login-form').addEventListener('submit', async () => {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showMessage('Please fill in all fields.');

      setLoading(true);
      document.getElementById('auth-message').classList.add('hidden');
      try {
        const res = await fetch(apiUrl('/api/auth/login'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showMessage(data.error || 'Login failed.'); return; }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        showMessage('Login successful! Redirecting...', false);
        setTimeout(() => { window.location.href = '/add-username.html'; }, 600);
      } catch (err) {
        showMessage('Network error. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    // Signup
    document.getElementById('signup-form').addEventListener('submit', async () => {
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;

      if (!email || !password || !confirm) return showMessage('Please fill in all fields.');
      if (password.length < 6) return showMessage('Password must be at least 6 characters.');
      if (password !== confirm) return showMessage('Passwords do not match.');

      setLoading(true);
      document.getElementById('auth-message').classList.add('hidden');
      try {
        const res = await fetch(apiUrl('/api/auth/signup'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showMessage(data.error || 'Signup failed.'); return; }

        localStorage.setItem('token', data.token);
        localStorage.setItem('userEmail', data.user.email);
        showMessage('Account created! Redirecting...', false);
        setTimeout(() => { window.location.href = '/add-username.html'; }, 600);
      } catch (err) {
        showMessage('Network error. Please try again.');
      } finally {
        setLoading(false);
      }
    });

    (async () => {
      setGoogleHint('Checking Google sign-in availability...');
      await loadGoogleAuthConfig();
      if (!googleAuthEnabled) return;
      for (let i = 0; i < 20; i++) {
        maybeRenderGoogleButton();
        if (googleButtonRendered) return;
        await new Promise(r => setTimeout(r, 150));
      }
      if (!googleButtonRendered) setGoogleHint('Google script did not load. Check browser blockers and origin settings.');
    })();
  </script>
</body>
</html>
