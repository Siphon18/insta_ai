<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>AI Persona Chat</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/config.js"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <style>
    body { font-family: 'Space Grotesk', sans-serif; }

    /* background */
    @keyframes gradient-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animated-gradient-bg {
      background: linear-gradient(-45deg, #0a0a0a, #1a0a2e, #120a1e, #0d0d0d, #1c0818);
      background-size: 400% 400%;
      animation: gradient-shift 18s ease infinite;
    }
    .grid-pattern {
      background-image: radial-gradient(circle, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .glass {
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border: 1px solid rgba(255,255,255,.06);
    }

    .gradient-text {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .instagram-gradient {
      background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .btn-shimmer {
      background: linear-gradient(135deg, #833ab4 0%, #e1306c 50%, #fcb045 100%);
    }

    /* messages */
    @keyframes msg-in {
      0%   { opacity: 0; transform: translateY(12px) scale(.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .chat-message { animation: msg-in .4s cubic-bezier(.22,1,.36,1) forwards; }

    /* typing */
    @keyframes pulse-dot {
      0%,100% { transform: translateY(0); opacity: .5; }
      50%     { transform: translateY(-4px); opacity: 1; }
    }
    .typing-dot { animation: pulse-dot .6s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .15s; }
    .typing-dot:nth-child(3) { animation-delay: .3s; }

    /* input glow */
    .input-glow:focus-within {
      box-shadow: 0 0 0 2px rgba(225,48,108,.35), 0 0 24px -4px rgba(131,58,180,.15);
    }

    /* message bubble hover */
    .bubble-hover { transition: background .2s ease, box-shadow .3s ease; }
    .bubble-hover:hover { box-shadow: 0 4px 20px -6px rgba(0,0,0,.3); }

    /* sidebar */
    .insta-ring-sm {
      background: conic-gradient(from 0deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5, #feda75);
      padding: 2px; border-radius: 50%;
    }

    /* scrollbar */
    #chat-container::-webkit-scrollbar { width: 6px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
    #chat-container::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }

    /* insta carousel */
    .insta-carousel { height: 420px; display: flex; align-items: center; justify-content: center; }
    .insta-track { display: flex; height: 100%; transition: transform 520ms cubic-bezier(.2,.9,.3,1); will-change: transform; }
    .insta-slide { min-width: 100%; height: 100%; padding: 4px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; }
    .insta-slide img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; transition: transform 400ms ease; }
    .insta-slide.active img { transform: scale(1.01); }

    .voice-indicator {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b;
      padding: 2px 8px; background: rgba(100,116,139,.1); border-radius: 12px; margin-top: 4px;
    }
    .voice-indicator .material-symbols-outlined { font-size: 14px; }

    /* entrance */
    @keyframes fade-up { 0%{ opacity:0; transform:translateY(16px);} 100%{ opacity:1; transform:translateY(0);} }
    .animate-fade-up { animation: fade-up .5s cubic-bezier(.22,1,.36,1) forwards; opacity: 0; }
  </style>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { primary: "#E1306C", accent: "#833ab4", "background-dark": "#0b1117" },
          fontFamily: { display: ["Space Grotesk"] },
          borderRadius: { DEFAULT: "0.5rem", lg: "1rem", xl: "1.5rem", full: "9999px" },
        },
      },
    };
  </script>
</head>

<body class="animated-gradient-bg font-display text-slate-200 overflow-hidden">
  <div class="flex h-screen flex-col grid-pattern">
    <!-- HEADER -->
    <header class="border-b border-white/5 px-4 sm:px-6 py-3 backdrop-blur-xl bg-black/30 z-10">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a href="/" class="text-primary hover:text-primary/80 transition-colors">
            <span class="material-symbols-outlined">home</span>
          </a>
          <nav class="hidden md:flex items-center gap-4">
            <a class="text-sm font-medium text-gray-400 hover:text-primary transition-colors duration-300" href="/">Home</a>
            <a class="text-sm font-medium text-gray-400 hover:text-primary transition-colors duration-300" href="/index.html">About</a>
          </nav>
        </div>
        <div class="flex items-center gap-2">
          <div id="admin-usage-pill" class="hidden items-center gap-2 text-[11px] text-gray-300 border border-white/10 bg-white/5 rounded-xl px-2.5 py-1.5">
            <span class="material-symbols-outlined text-[14px] text-primary">analytics</span>
            <span id="admin-usage-pill-text">API: -</span>
          </div>
          <button id="clear-chat-btn" type="button"
            class="text-gray-400 hover:text-red-400 border border-white/10 hover:border-red-400/30 font-medium py-2 px-3 rounded-xl text-sm transition-all duration-300 hover:scale-[1.03] active:scale-[0.97] flex items-center gap-1.5"
            title="Clear chat history">
            <span class="material-symbols-outlined text-base">delete_sweep</span>
            <span class="hidden sm:inline">Clear</span>
          </button>
          <button id="new-chat-btn" type="button"
            class="btn-shimmer text-white font-bold py-2 px-4 rounded-xl text-sm transition-all duration-300 hover:scale-[1.03] active:scale-[0.97] flex items-center gap-1.5">
            <span class="material-symbols-outlined text-base">add</span>
            New Chat
          </button>
          <div id="header-user-pic" class="h-9 w-9 rounded-full bg-cover bg-center ring-2 ring-white/10 transition-transform duration-300 hover:scale-110"></div>
        </div>
      </div>
    </header>

    <!-- MAIN -->
    <main class="flex flex-1 flex-col xl:flex-row overflow-hidden">
      <!-- Chat area -->
      <div class="flex flex-1 flex-col p-4 md:p-6">
        <!-- Messages -->
        <div id="chat-container" class="flex-1 space-y-6 overflow-y-auto pr-2 scroll-smooth">
          <div class="flex flex-col gap-3 animate-fade-up">
            <h2 class="text-2xl font-bold text-white">Chat with an <span class="instagram-gradient">Instagram</span> Persona</h2>
            <p class="text-sm text-gray-400">Start a conversation with an AI that mimics a personality from an Instagram profile.</p>
          </div>
        </div>

        <!-- Input -->
        <div class="mt-auto pt-4">
          <form id="chat-form" class="relative input-glow rounded-xl transition-all duration-300">
            <div id="user-input-pic" class="h-9 w-9 absolute left-3 top-1/2 -translate-y-1/2 rounded-full bg-cover bg-center ring-1 ring-white/10"></div>
            <input id="message-input"
              class="w-full rounded-xl border border-white/10 bg-white/5 py-3.5 pl-16 pr-28 text-slate-200 placeholder-gray-500 focus:ring-0 focus:border-white/20 outline-none transition-all duration-300"
              placeholder="Type your message..." type="text" autocomplete="off" />
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-2">
              <button id="mic-btn" type="button"
                class="bg-white/5 border border-white/10 text-primary rounded-full hover:bg-primary hover:text-white hover:border-primary transition-all duration-300 flex items-center justify-center h-9 w-9"
                title="Voice Chat" aria-label="Start voice chat">
                <span class="material-symbols-outlined text-[18px]">mic</span>
              </button>
              <button type="submit"
                class="btn-shimmer text-white font-bold py-2 px-4 rounded-xl text-sm transition-all duration-300 hover:scale-[1.03] active:scale-[0.97]">
                Send
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- Sidebar -->
      <aside class="hidden xl:flex w-96 border-l border-white/5 p-6 flex-col space-y-6 overflow-y-auto backdrop-blur-sm bg-black/10">
        <div id="persona-info" class="space-y-4">
          <div class="text-sm text-gray-500 italic">Loading personaâ€¦</div>
        </div>

        <div id="instagram-widget" class="flex flex-col space-y-4">
          <div class="flex items-center justify-between">
            <h3 id="insta-title" class="text-base font-semibold text-white">Photos</h3>
            <span id="insta-status" class="text-xs text-gray-500" style="display:none;"></span>
            <div class="flex items-center gap-1">
              <button id="insta-prev" aria-label="Previous" class="p-1.5 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-base">chevron_left</span>
              </button>
              <button id="insta-next" aria-label="Next" class="p-1.5 rounded-lg hover:bg-white/5 text-gray-400 hover:text-white transition-colors">
                <span class="material-symbols-outlined text-base">chevron_right</span>
              </button>
            </div>
          </div>
          <div id="insta-carousel" class="insta-carousel relative overflow-hidden rounded-xl glass">
            <div class="insta-track"></div>
            <div class="insta-empty text-sm text-gray-500 p-4 text-center">
              <span class="material-symbols-outlined text-3xl text-gray-600 mb-2 block">photo_library</span>
              Photos unavailable
            </div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script>
    // Auth helper
    function getToken() { return localStorage.getItem('token'); }
    function authHeaders(extra = {}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }
    function authFetch(url, opts = {}) {
      if (!getToken()) { window.location.href = '/login.html'; return Promise.reject('No token'); }
      opts.headers = { ...authHeaders(), ...(opts.headers || {}) };
      return fetch(url, opts).then(r => {
        if (r.status === 401 || r.status === 403) { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        return r;
      });
    }

    // Verify token with server before loading
    (async () => {
      const token = getToken();
      if (!token) { window.location.href = '/login.html'; return; }
      try {
        const r = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!r.ok) throw new Error('invalid');
      } catch (e) {
        localStorage.removeItem('token');
        localStorage.removeItem('personaData');
        window.location.href = '/login.html';
      }
    })();

    document.addEventListener('DOMContentLoaded', async () => {
      const chatContainer = document.getElementById('chat-container');
      const chatForm = document.getElementById('chat-form');
      const messageInput = document.getElementById('message-input');
      const newChatBtn = document.getElementById('new-chat-btn');
      const micBtn = document.getElementById('mic-btn');
      const adminUsagePill = document.getElementById('admin-usage-pill');
      const adminUsagePillText = document.getElementById('admin-usage-pill-text');

      let isSubmitting = false;
      let currentSlideIndex = 0;
      let totalSlides = 0;

      const personaData = (() => { try { return JSON.parse(localStorage.getItem('personaData')); } catch(e) { return null; } })();
      const personaName = personaData?.name || 'AI Persona';
      const voiceInfo = personaData?.voiceId ? `${personaData.voiceId}${personaData.voiceDescription ? ' - ' + personaData.voiceDescription : ''}` : null;
      let aiPersonaPicUrl = localStorage.getItem('aiPersonaPic') || null;

      // Anime avatar for user (persisted per session via localStorage)
      const isFemaleVoice = ['Natalie','Ruby','Daisy'].some(v => (personaData?.voiceId || '').includes(v));
      let userSeed = localStorage.getItem('userAvatarSeed');
      if (!userSeed) { userSeed = 'user-' + Math.random().toString(36).substring(2, 8); localStorage.setItem('userAvatarSeed', userSeed); }
      const avatarStyle = isFemaleVoice ? 'lorelei' : 'adventurer';
      const userPicUrl = `https://api.dicebear.com/9.x/${avatarStyle}/svg?seed=${encodeURIComponent(userSeed)}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf&radius=50`;

      document.getElementById('header-user-pic').style.backgroundImage = `url("${aiPersonaPicUrl || userPicUrl}")`;
      document.getElementById('user-input-pic').style.backgroundImage = `url("${userPicUrl}")`;

      if (micBtn) micBtn.addEventListener('click', () => { window.location.href = '/voice-chat.html'; });

      // Instagram
      const INSTAGRAM_POSTS_ENDPOINT = '/instagram-posts';
      const DEFAULT_IMAGE_LIMIT = 12;

      function setInstaStatus(msg) {
        const el = document.getElementById('insta-status');
        if (!el) return;
        if (!msg) { el.style.display = 'none'; el.textContent = ''; }
        else { el.style.display = 'inline'; el.textContent = msg; }
      }

      async function loadAdminUsagePill() {
        try {
          const resp = await fetch('/api/admin/rapidapi-usage', { headers: authHeaders() });
          if (resp.status === 401) return;
          if (resp.status === 403) {
            if (adminUsagePill) adminUsagePill.classList.add('hidden');
            return;
          }
          if (!resp.ok) return;

          const data = await resp.json();
          if (!adminUsagePill || !adminUsagePillText) return;
          const daily = data.daily || {};
          const monthly = data.monthly || {};
          adminUsagePillText.textContent = `API D:${daily.used ?? 0}/${daily.limit ?? 0} M:${monthly.used ?? 0}/${monthly.limit ?? 0}`;
          adminUsagePill.classList.remove('hidden');
          adminUsagePill.classList.add('inline-flex');
        } catch (err) {
          console.error('[admin-usage-pill]', err);
        }
      }

      async function fetchInstagramPosts(username, limit = DEFAULT_IMAGE_LIMIT) {
        if (!username) return [];
        try {
          setInstaStatus('Loading...');
          const resp = await fetch(`/instagram-posts?username=${encodeURIComponent(username)}&limit=${encodeURIComponent(limit)}`);
          if (resp.status === 429) {
            const payload = await resp.json().catch(() => ({}));
            const retryAfterSec = parseInt(payload.retryAfterSec || '0', 10) || 0;
            setInstaStatus(retryAfterSec > 0 ? `Rate-limited, retry in ~${retryAfterSec}s` : 'Rate-limited, retry soon');
            return [];
          }
          if (!resp.ok) { setInstaStatus('Failed'); return []; }
          const json = await resp.json();
          const posts = Array.isArray(json.posts) ? json.posts : [];
          const images = posts.map(p => p.image_url).filter(Boolean);
          setInstaStatus('');
          return images;
        } catch (err) { setInstaStatus('Error'); return []; }
      }

      function proxiedImageUrl(url) {
        if (!url) return url;
        if (url.startsWith('/api/image-proxy') || url.startsWith('/image-proxy')) return url;
        return `/api/image-proxy?url=${encodeURIComponent(url)}`;
      }

      function renderCarousel(images) {
        const track = document.querySelector('#insta-carousel .insta-track');
        const empty = document.querySelector('#insta-carousel .insta-empty');
        if (!track) return;
        track.innerHTML = '';
        if (!images || !images.length) { if (empty) empty.style.display = 'block'; totalSlides = 0; return; }
        if (empty) empty.style.display = 'none';
        totalSlides = images.length;
        currentSlideIndex = 0;
        images.forEach((src, i) => {
          const slide = document.createElement('div');
          slide.className = 'insta-slide';
          slide.dataset.index = i;
          const img = document.createElement('img');
          img.src = proxiedImageUrl(src);
          img.alt = `Post ${i + 1}`;
          img.loading = 'lazy';
          slide.appendChild(img);
          track.appendChild(slide);
        });
        updateCarouselPosition();
      }

      function updateCarouselPosition() {
        const track = document.querySelector('#insta-carousel .insta-track');
        if (!track) return;
        track.querySelectorAll('.insta-slide').forEach((s, i) => s.classList.toggle('active', i === currentSlideIndex));
        track.style.transform = `translateX(${-currentSlideIndex * 100}%)`;
      }

      document.getElementById('insta-prev')?.addEventListener('click', () => { if (!totalSlides) return; currentSlideIndex = (currentSlideIndex - 1 + totalSlides) % totalSlides; updateCarouselPosition(); });
      document.getElementById('insta-next')?.addEventListener('click', () => { if (!totalSlides) return; currentSlideIndex = (currentSlideIndex + 1) % totalSlides; updateCarouselPosition(); });

      // â”€â”€ Message helpers â”€â”€
      function addTypingIndicator() {
        if (!chatContainer || document.getElementById('typing-indicator-dyn')) return;
        const div = document.createElement('div');
        div.id = 'typing-indicator-dyn';
        div.className = 'flex items-start gap-3 chat-message';

        const pic = document.createElement('div');
        pic.className = 'h-9 w-9 shrink-0 rounded-full bg-cover bg-center ring-1 ring-white/10';
        pic.style.backgroundImage = `url("${aiPersonaPicUrl || userPicUrl}")`;

        const content = document.createElement('div');
        content.className = 'flex flex-col gap-1';
        const name = document.createElement('p');
        name.className = 'text-xs font-semibold text-gray-400';
        name.textContent = personaName;
        const bubble = document.createElement('div');
        bubble.className = 'rounded-xl p-3 bg-white/5 border border-white/5';
        const dots = document.createElement('div');
        dots.className = 'flex items-center space-x-1.5';
        for (let i = 0; i < 3; i++) {
          const dot = document.createElement('span');
          dot.className = 'typing-dot w-2 h-2 bg-gray-500 rounded-full';
          dots.appendChild(dot);
        }
        bubble.appendChild(dots);
        content.appendChild(name);
        content.appendChild(bubble);
        div.appendChild(pic);
        div.appendChild(content);
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function removeTypingIndicator() {
        const el = document.getElementById('typing-indicator-dyn');
        if (el) el.remove();
      }

      function addMessage(sender, text, isUser = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex items-start gap-3 chat-message ${isUser ? 'flex-row-reverse' : ''}`;

        const pic = document.createElement('div');
        pic.className = 'h-9 w-9 shrink-0 rounded-full bg-cover bg-center ring-1 ring-white/10';
        pic.style.backgroundImage = `url("${isUser ? userPicUrl : (aiPersonaPicUrl || userPicUrl)}")`;

        const content = document.createElement('div');
        content.className = 'flex flex-col gap-1';
        const name = document.createElement('p');
        name.className = `text-xs font-semibold ${isUser ? 'text-right' : ''} text-gray-400`;
        name.textContent = sender;

        const bubble = document.createElement('div');
        bubble.className = `rounded-xl p-3 max-w-md bubble-hover ${isUser ? 'bg-gradient-to-r from-[#833ab4] via-[#fd1d1d] to-[#fcb045] text-white' : 'bg-white/5 border border-white/5 text-gray-200'}`;
        const textEl = document.createElement('p');
        textEl.className = 'text-sm leading-relaxed';
        textEl.textContent = text;
        bubble.appendChild(textEl);

        content.appendChild(name);
        content.appendChild(bubble);
        msgDiv.appendChild(pic);
        msgDiv.appendChild(content);
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }

      function createAIMessageBubble() {
        if (!chatContainer) return null;
        const msgDiv = document.createElement('div');
        msgDiv.className = 'flex items-start gap-3 chat-message';

        const pic = document.createElement('div');
        pic.className = 'h-9 w-9 shrink-0 rounded-full bg-cover bg-center ring-1 ring-white/10';
        pic.style.backgroundImage = `url("${aiPersonaPicUrl || userPicUrl}")`;

        const content = document.createElement('div');
        content.className = 'flex flex-col gap-1';
        const senderInfo = document.createElement('div');
        senderInfo.className = 'flex items-center gap-2';
        const name = document.createElement('p');
        name.className = 'text-xs font-semibold text-gray-400';
        name.textContent = personaName;
        senderInfo.appendChild(name);

        const bubble = document.createElement('div');
        bubble.className = 'rounded-xl p-3 max-w-md bg-white/5 border border-white/5 bubble-hover';
        const textEl = document.createElement('p');
        textEl.className = 'text-sm text-gray-200 leading-relaxed';
        bubble.appendChild(textEl);

        content.appendChild(senderInfo);
        content.appendChild(bubble);
        msgDiv.appendChild(pic);
        msgDiv.appendChild(content);
        chatContainer.appendChild(msgDiv);
        chatContainer.scrollTop = chatContainer.scrollHeight;

        return { textElement: textEl, senderInfoContainer: senderInfo };
      }

      async function typeTextIntoElement(el, text, speed = 20) {
        if (!el) return;
        el.textContent = '';
        for (let i = 0; i < text.length; i++) {
          el.textContent += text[i];
          chatContainer.scrollTop = chatContainer.scrollHeight;
          await new Promise(res => setTimeout(res, speed));
        }
      }

      async function fetchAndRenderReply(userMessage = "", _retryCount = 0) {
        if (isSubmitting && _retryCount === 0) return;
        isSubmitting = true;
        if (_retryCount === 0) addTypingIndicator();
        try {
          const response = await authFetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: userMessage }) });
          const data = await response.json();
          if (!response.ok) {
            if (response.status === 429) {
              if (_retryCount < 3) {
                const waitSec = Math.min(12 * Math.pow(2, _retryCount), 60);
                console.log(`[chat] 429 rate limited, auto-retrying in ${waitSec}s (attempt ${_retryCount + 1}/3)...`);
                await new Promise(r => setTimeout(r, waitSec * 1000));
                return fetchAndRenderReply(userMessage, _retryCount + 1);
              }
              removeTypingIndicator();
              addMessage(personaName, data.error || 'I am a bit busy right now - try again in a minute.', false);
              return;
            }
            throw new Error(data.error || 'Server error');
          }
          await renderResponse(data);
        } catch (err) {
          console.error('[fetchAndRenderReply]', err);
          removeTypingIndicator();
          addMessage(personaName, err.message || 'Oops, something went wrong.', false);
        } finally { isSubmitting = false; }
      }

      async function renderResponse(data) {
        await new Promise(r => setTimeout(r, 600));
        removeTypingIndicator();
        const replyText = data.response || '(no response)';
        const bubbleElements = createAIMessageBubble();
        if (!bubbleElements) return;
        await typeTextIntoElement(bubbleElements.textElement, replyText);
        if (data.audioUrl) {
          const audio = new Audio(data.audioUrl);
          audio.play().catch(err => console.error('Audio play failed:', err));
          const playBtn = document.createElement('button');
          playBtn.className = 'text-gray-500 hover:text-primary transition-colors duration-200';
          playBtn.innerHTML = `<span class="material-symbols-outlined" style="font-size:14px">volume_up</span>`;
          playBtn.title = 'Play audio';
          playBtn.onclick = () => { audio.currentTime = 0; audio.play().catch(e => console.error(e)); };
          bubbleElements.senderInfoContainer.appendChild(playBtn);
        }
      }

      async function loadAndRenderHistory() {
        try {
          const response = await authFetch('/get-chat-history');
          if (!response.ok) throw new Error('Bad response');
          const history = await response.json();
          if (history && history.length > 0) {
            chatContainer.innerHTML = '';
            let lastRole = null, lastText = null;
            for (const message of history) {
              const text = message.parts?.[0]?.text || '';
              if (text === lastText && message.role === lastRole) continue;
              addMessage(message.role === 'user' ? 'You' : personaName, text, message.role === 'user');
              lastRole = message.role;
              lastText = text;
            }
          }
          return Array.isArray(history) ? history.length : 0;
        } catch (error) {
          console.error("Failed to load chat history:", error);
          return 0;
        }
      }

      async function tryInitialGreeting() {
        if (!personaData || !personaData.username) {
          addMessage(personaName, 'Please create a persona first.');
          setTimeout(() => { window.location.href = '/add-username.html'; }, 1500);
          return;
        }
        const loaded = await loadAndRenderHistory();
        if (loaded === 0) {
          // Request a canned greeting (no Groq call, just a hello)
          addTypingIndicator();
          try {
            const response = await authFetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: '' }) });
            const data = await response.json();
            if (response.ok && data.response) {
              await new Promise(r => setTimeout(r, 400));
              removeTypingIndicator();
              const bubbleElements = createAIMessageBubble();
              if (bubbleElements) await typeTextIntoElement(bubbleElements.textElement, data.response);
            } else {
              removeTypingIndicator();
            }
          } catch (e) {
            console.error('[greeting]', e);
            removeTypingIndicator();
          }
        }
      }

      function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }

      function populatePersonaSidebar() {
        const personaContainer = document.getElementById('persona-info');
        if (!personaContainer) return;

        if (!personaData) {
          personaContainer.innerHTML = `
            <div class="glass rounded-xl p-4 text-center">
              <p class="text-sm text-gray-400 mb-3">No persona set</p>
              <a href="/add-username.html" class="inline-flex items-center gap-1 px-3 py-1.5 rounded-lg bg-primary/20 text-primary text-sm font-semibold hover:bg-primary/30 transition-colors">
                <span class="material-symbols-outlined text-sm">add</span> Create Persona
              </a>
            </div>`;
          return;
        }

        const avatarUrl = aiPersonaPicUrl || '';
        const voiceHtml = voiceInfo ? `<div class="voice-indicator"><span class="material-symbols-outlined">record_voice_over</span><span>${escapeHtml(voiceInfo)}</span></div>` : '';

        personaContainer.innerHTML = `
          <div class="glass rounded-xl p-4 space-y-4">
            <div class="flex items-center gap-3">
              <div class="insta-ring-sm shrink-0">
                <div class="w-12 h-12 rounded-full bg-cover bg-center" style="background-image:url('${avatarUrl}')"></div>
              </div>
              <div class="min-w-0">
                <h4 class="text-sm font-bold text-white truncate">${escapeHtml(personaData.name || '')}</h4>
                <p class="text-xs text-gray-400">@${escapeHtml(personaData.username || '')}</p>
                ${voiceHtml}
              </div>
            </div>
            <p class="text-xs text-gray-400 leading-relaxed">${escapeHtml(personaData.bio || 'No bio provided.')}</p>
            <div class="flex items-center gap-2">
              <a href="/add-username.html" class="px-3 py-1 rounded-lg border border-white/10 text-xs text-gray-300 hover:bg-white/5 transition-colors">Edit</a>
              <button id="load-insta-btn" class="px-3 py-1 rounded-lg bg-primary/20 text-primary text-xs font-semibold hover:bg-primary/30 transition-colors">Refresh Photos</button>
            </div>
          </div>`;

        const loadInstaBtn = personaContainer.querySelector('#load-insta-btn');
        if (loadInstaBtn) {
          loadInstaBtn.addEventListener('click', async () => {
            if (!personaData?.username) return;
            const imgs = await fetchInstagramPosts(personaData.username, DEFAULT_IMAGE_LIMIT);
            renderCarousel(imgs);
          });
        }
      }

      // â”€â”€ Event listeners â”€â”€
      if (chatForm) chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = messageInput.value.trim();
        if (!msg || isSubmitting) return;
        addMessage('You', msg, true);
        messageInput.value = '';
        await fetchAndRenderReply(msg);
      });

      if (newChatBtn) newChatBtn.addEventListener('click', async () => {
        newChatBtn.disabled = true;
        try {
          await authFetch('/new-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
        } catch (e) { console.error(e); }
        localStorage.removeItem('personaData');
        localStorage.removeItem('aiPersonaPic');
        window.location.href = '/add-username.html';
      });

      // Clear chat history (keep persona)
      const clearChatBtn = document.getElementById('clear-chat-btn');
      if (clearChatBtn) clearChatBtn.addEventListener('click', async () => {
        if (!confirm('Clear all messages? The persona will stay.')) return;
        clearChatBtn.disabled = true;
        clearChatBtn.style.opacity = '0.5';
        try {
          await authFetch('/api/chat-history', { method: 'DELETE' });
          // Reset chat container to initial state
          chatContainer.innerHTML = `
            <div class="flex flex-col gap-3 animate-fade-up">
              <h2 class="text-2xl font-bold text-white">Chat with an <span class="instagram-gradient">Instagram</span> Persona</h2>
              <p class="text-sm text-gray-400">Start a conversation with an AI that mimics a personality from an Instagram profile.</p>
            </div>`;
          // Trigger a fresh canned greeting (no Groq call)
          await tryInitialGreeting();
        } catch (e) { console.error('[clear-chat]', e); }
        clearChatBtn.disabled = false;
        clearChatBtn.style.opacity = '1';
      });

      // Logout handler â€” clear everything and go to login
      const logoutHandler = () => {
        localStorage.removeItem('token');
        localStorage.removeItem('userEmail');
        localStorage.removeItem('personaData');
        localStorage.removeItem('aiPersonaPic');
        window.location.href = '/login.html';
      };

      // auto-load instagram
      (async () => {
        if (!personaData?.username) return;
        await new Promise(r => setTimeout(r, 500));
        const imgs = await fetchInstagramPosts(personaData.username, DEFAULT_IMAGE_LIMIT);
        if (imgs.length) renderCarousel(imgs);
      })();

      // Removed focus-based history reload â€” it caused stale messages to reappear

      populatePersonaSidebar();
      loadAdminUsagePill();
      setInterval(loadAdminUsagePill, 60000);
      tryInitialGreeting();
    });
  </script>
</body>
</html>
